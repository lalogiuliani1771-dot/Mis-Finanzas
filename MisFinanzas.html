<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis Finanzas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080d18; font-family: 'DM Sans', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c1526; }
    ::-webkit-scrollbar-thumb { background: #1a2535; border-radius: 4px; }
    select option { background: #0c1526; color: #e2e8f0; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const MONTHS_ES = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const TODAY = new Date();
const DEFAULT_CATS = ["Educación","Servicios","Alimentación","Transporte","Salud","Hogar","Varios"];
const DEFAULT_PWD = "cata2009";
const uid = () => Math.random().toString(36).slice(2, 9);
const pad = n => String(n).padStart(2, "0");
const mkey = (y, m) => `${y}-${pad(m + 1)}`;
const fmt = n => Number(n || 0).toLocaleString("es-AR", { minimumFractionDigits: 0, maximumFractionDigits: 0 });

// ─── STORAGE (localStorage) ──────────────────────────────────────────────────
const SK = { months: "fin-months", funds: "fin-funds", settings: "fin-settings", cats: "fin-cats" };
const load = key => { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } };
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

// ─── BASE UI ─────────────────────────────────────────────────────────────────
const Modal = ({ title, subtitle, onClose, children }) => (
  <div style={s.overlay} onClick={e => e.target === e.currentTarget && onClose?.()}>
    <div style={s.modal}>
      <div style={s.mHead}>
        <div>
          <div style={s.mTitle}>{title}</div>
          {subtitle && <div style={s.mSub}>{subtitle}</div>}
        </div>
        {onClose && <button style={s.closeBtn} onClick={onClose}>✕</button>}
      </div>
      <div style={{ padding: "0 24px 24px" }}>{children}</div>
    </div>
  </div>
);

const Field = ({ label, children }) => (
  <label style={s.fieldWrap}><span style={s.fieldLabel}>{label}</span>{children}</label>
);

const Inp = props => <input style={{ ...s.input, width: "100%" }} {...props}/>;

const Btn = ({ variant = "primary", style: extra = {}, ...props }) =>
  <button style={{ ...(variant === "primary" ? s.btnPrimary : variant === "danger" ? s.btnDanger : s.btnSec), ...extra }} {...props}/>;

const Row = ({ gap = 12, style: extra = {}, children }) =>
  <div style={{ display: "flex", gap, alignItems: "center", ...extra }}>{children}</div>;

// ─── EXPENSE FORM ─────────────────────────────────────────────────────────────
function ExpenseForm({ initial, categories, onSave, onAddCat, onCancel }) {
  const blank = { name:"", category: categories[0] ?? "Varios", amount:"", dueDay:"", paid:false, recurring:false, method:"Billetera", note:"" };
  const [f, setF] = useState(initial ?? blank);
  const [newCat, setNewCat] = useState("");
  const [showNewCat, setShowNewCat] = useState(false);
  const set = (k,v) => setF(p => ({...p,[k]:v}));

  const handleSave = () => {
    if (!f.name.trim() || !f.amount) return;
    onSave({ ...f, amount: Number(f.amount), dueDay: f.dueDay ? Number(f.dueDay) : null });
  };

  const handleAddCat = () => {
    if (!newCat.trim()) return;
    onAddCat(newCat.trim());
    set("category", newCat.trim());
    setNewCat(""); setShowNewCat(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", gap:16 }}>
      <Field label="Nombre del gasto">
        <Inp value={f.name} onChange={e=>set("name",e.target.value)} placeholder="Ej: Cuota colegio" autoFocus/>
      </Field>
      <Field label="Categoría">
        <Row gap={8}>
          <select style={{...s.input,flex:1}} value={f.category} onChange={e=>set("category",e.target.value)}>
            {categories.map(c=><option key={c}>{c}</option>)}
          </select>
          {!showNewCat && <button style={s.chipBtn} onClick={()=>setShowNewCat(true)}>+ nueva</button>}
        </Row>
        {showNewCat && (
          <Row gap={8} style={{marginTop:8}}>
            <Inp value={newCat} onChange={e=>setNewCat(e.target.value)} placeholder="Nueva categoría…" style={{flex:1}}/>
            <button style={s.chipBtn} onClick={handleAddCat}>OK</button>
            <button style={{...s.chipBtn,background:"#2d1b1b",color:"#f87171"}} onClick={()=>setShowNewCat(false)}>✕</button>
          </Row>
        )}
      </Field>
      <Row gap={12}>
        <Field label="Monto $"><Inp type="number" value={f.amount} onChange={e=>set("amount",e.target.value)} placeholder="0"/></Field>
        <Field label="Día vto."><Inp type="number" min={1} max={31} value={f.dueDay} onChange={e=>set("dueDay",e.target.value)} placeholder="—"/></Field>
      </Row>
      <Field label="Medio de pago">
        <Row gap={0}>
          {["Billetera","Efectivo"].map(m=>(
            <button key={m} onClick={()=>set("method",m)}
              style={{...s.toggle,...(f.method===m?s.toggleActive:{})}}>{m}</button>
          ))}
        </Row>
      </Field>
      <Field label="Nota opcional">
        <Inp value={f.note} onChange={e=>set("note",e.target.value)} placeholder="Ej: débito automático"/>
      </Field>
      <Row gap={20}>
        <label style={s.checkLabel}>
          <input type="checkbox" checked={f.recurring} onChange={e=>set("recurring",e.target.checked)} style={{accentColor:"#c9a96e"}}/>
          Recurrente
        </label>
        <label style={s.checkLabel}>
          <input type="checkbox" checked={f.paid} onChange={e=>set("paid",e.target.checked)} style={{accentColor:"#4ade80"}}/>
          Ya pagado
        </label>
      </Row>
      <Row gap={10} style={{marginTop:4}}>
        <Btn onClick={handleSave} style={{flex:1}}>Guardar</Btn>
        <Btn variant="sec" onClick={onCancel}>Cancelar</Btn>
      </Row>
    </div>
  );
}

// ─── TAB MES ─────────────────────────────────────────────────────────────────
function TabMes({ allMonths, setAllMonths, categories, setCategories }) {
  const [year, setYear] = useState(TODAY.getFullYear());
  const [month, setMonth] = useState(TODAY.getMonth());
  const [modal, setModal] = useState(null);
  const [editTarget, setEditTarget] = useState(null);
  const [incomeVal, setIncomeVal] = useState("");

  const key = mkey(year, month);
  const todayDay = (TODAY.getFullYear()===year && TODAY.getMonth()===month) ? TODAY.getDate() : null;

  const md = useCallback(() => allMonths[key] ?? { income:0, expenses:[], extraIncome:[] }, [allMonths, key]);
  const { income, expenses, extraIncome } = md();

  const updateMonth = useCallback(patch => {
    const base = md();
    const next = { ...allMonths, [key]: { ...base, ...patch } };
    setAllMonths(next);
    save(SK.months, next);
  }, [allMonths, key, md]);

  const prevMonth = () => { if(month===0){setYear(y=>y-1);setMonth(11);}else setMonth(m=>m-1); };
  const nextMonth = () => { if(month===11){setYear(y=>y+1);setMonth(0);}else setMonth(m=>m+1); };

  const carryRecurring = () => {
    const pm = month===0?11:month-1, py = month===0?year-1:year;
    const prev = allMonths[mkey(py,pm)];
    if (!prev?.expenses?.length) { alert("No hay datos del mes anterior."); return; }
    const recurring = prev.expenses.filter(e=>e.recurring).map(e=>({...e,id:uid(),paid:false}));
    const cur = md();
    const existing = cur.expenses.map(e=>e.name+e.category);
    const toAdd = recurring.filter(r=>!existing.includes(r.name+r.category));
    if (!toAdd.length) { alert("No hay nuevos recurrentes para agregar."); return; }
    updateMonth({ expenses:[...cur.expenses,...toAdd] });
  };

  const saveExpense = form => {
    if (editTarget) updateMonth({ expenses: expenses.map(e=>e.id===editTarget.id?{...e,...form}:e) });
    else updateMonth({ expenses:[...expenses,{...form,id:uid()}] });
    setModal(null); setEditTarget(null);
  };

  const addCat = name => {
    const next = [...categories, name];
    setCategories(next);
    save(SK.cats, next);
  };

  const togglePaid = id => updateMonth({ expenses: expenses.map(e=>e.id===id?{...e,paid:!e.paid}:e) });
  const deleteExp  = id => { if(window.confirm("¿Eliminar este gasto?")) updateMonth({ expenses: expenses.filter(e=>e.id!==id) }); };
  const saveIncome = () => { updateMonth({ income: Number(incomeVal)||0 }); setModal(null); };

  const totalExtra    = (extraIncome||[]).reduce((s,x)=>s+x.amount,0);
  const totalIncome   = income+totalExtra;
  const totalGastos   = expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totalPagado   = expenses.filter(e=>e.paid).reduce((s,e)=>s+(e.amount||0),0);
  const totalPendiente= totalGastos-totalPagado;
  const balance       = totalIncome-totalGastos;
  const pct           = totalGastos ? Math.round((totalPagado/totalGastos)*100) : 0;

  const upcoming = todayDay ? expenses.filter(e=>!e.paid&&e.dueDay>=todayDay&&e.dueDay<=todayDay+5) : [];
  const vencidos  = todayDay ? expenses.filter(e=>!e.paid&&e.dueDay&&e.dueDay<todayDay) : [];

  const byCat = {};
  expenses.forEach(e=>{ if(!byCat[e.category]) byCat[e.category]=[]; byCat[e.category].push(e); });

  return (
    <div style={s.tabBody}>
      <div style={s.monthNav}>
        <button style={s.navArrow} onClick={prevMonth}>‹</button>
        <span style={s.monthTitle}>{MONTHS_ES[month]} {year}</span>
        <button style={s.navArrow} onClick={nextMonth}>›</button>
      </div>

      {vencidos.length>0 && (
        <div style={{...s.alertBar,borderColor:"#7f1d1d",background:"rgba(239,68,68,.07)"}}>
          <span style={{color:"#f87171",fontSize:16}}>⚠</span>
          <div>
            <div style={{...s.alertTitle,color:"#f87171"}}>Gastos vencidos sin pagar</div>
            <div style={s.chips}>{vencidos.map(e=><span key={e.id} style={{...s.chip,background:"rgba(239,68,68,.15)",color:"#fca5a5"}}>{e.name} · día {e.dueDay}</span>)}</div>
          </div>
        </div>
      )}
      {upcoming.length>0 && (
        <div style={s.alertBar}>
          <span style={{color:"#fbbf24",fontSize:16}}>🔔</span>
          <div>
            <div style={s.alertTitle}>Próximos vencimientos (5 días)</div>
            <div style={s.chips}>{upcoming.map(e=><span key={e.id} style={s.chip}>{e.name} · día {e.dueDay} · ${fmt(e.amount)}</span>)}</div>
          </div>
        </div>
      )}

      <div style={s.cardGrid}>
        <div style={{...s.card,cursor:"pointer"}} onClick={()=>{setIncomeVal(String(income));setModal("income");}}>
          <div style={s.cardLabel}>Ingreso del mes</div>
          <div style={{...s.cardAmt,color:"#4ade80"}}>${fmt(income)}</div>
          {totalExtra>0 && <div style={s.cardSub}>+ ${fmt(totalExtra)} retiros → ${fmt(totalIncome)}</div>}
          <div style={s.cardHint}>toca para editar</div>
        </div>
        <div style={s.card}>
          <div style={s.cardLabel}>Total gastos</div>
          <div style={{...s.cardAmt,color:"#f87171"}}>${fmt(totalGastos)}</div>
          <div style={s.cardSub}>{expenses.length} ítem{expenses.length!==1?"s":""}</div>
        </div>
        <div style={{...s.card,borderColor:balance>=0?"#166534":"#7f1d1d",background:balance>=0?"rgba(74,222,128,.05)":"rgba(248,113,113,.05)"}}>
          <div style={s.cardLabel}>Balance</div>
          <div style={{...s.cardAmt,color:balance>=0?"#4ade80":"#f87171"}}>{balance>=0?"+":""}${fmt(Math.abs(balance))}</div>
          <div style={s.cardSub}>{balance>=0?"Superávit ✓":"Déficit ✗"}</div>
        </div>
        <div style={s.card}>
          <div style={s.cardLabel}>Pagado / Pendiente</div>
          <Row gap={6} style={{marginTop:8}}>
            <span style={{color:"#4ade80",fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700}}>${fmt(totalPagado)}</span>
            <span style={{color:"#334155"}}>/</span>
            <span style={{color:"#fbbf24",fontFamily:"'Cormorant Garamond',serif",fontSize:20,fontWeight:700}}>${fmt(totalPendiente)}</span>
          </Row>
          <div style={s.progressTrack}><div style={{...s.progressFill,width:`${pct}%`}}/></div>
          <div style={s.cardHint}>{pct}% pagado</div>
        </div>
      </div>

      {(extraIncome||[]).length>0 && (
        <div style={s.extraBox}>
          <div style={s.sectionTitle}>Ingresos extraordinarios</div>
          {extraIncome.map(x=>(
            <div key={x.id} style={{display:"flex",alignItems:"center",gap:10,padding:"4px 0",fontSize:13}}>
              <span style={{color:"#c9a96e"}}>↓ {x.source}</span>
              <span style={{color:"#4ade80",fontWeight:600,marginLeft:"auto"}}>${fmt(x.amount)}</span>
              <span style={{color:"#475569",fontSize:11}}>{x.date}</span>
            </div>
          ))}
        </div>
      )}

      <Row gap={10}>
        <Btn onClick={()=>{setEditTarget(null);setModal("addExp");}}>+ Agregar gasto</Btn>
        <Btn variant="sec" onClick={carryRecurring}>↻ Traer recurrentes</Btn>
      </Row>

      <div style={{display:"flex",flexDirection:"column",gap:20}}>
        {Object.entries(byCat).map(([cat,items])=>{
          if(!items.length) return null;
          const catTotal = items.reduce((s,e)=>s+(e.amount||0),0);
          return (
            <div key={cat}>
              <div style={s.catHeader}>
                <span style={s.catName}>{cat}</span>
                <span style={s.catTotal}>${fmt(catTotal)}</span>
              </div>
              {items.map(exp=>{
                const isV = !exp.paid&&todayDay&&exp.dueDay&&exp.dueDay<todayDay;
                const isP = !exp.paid&&todayDay&&exp.dueDay>=todayDay&&exp.dueDay<=todayDay+5;
                return (
                  <div key={exp.id} style={{
                    ...s.expRow,
                    borderLeftColor: exp.paid?"#4ade80":isV?"#ef4444":isP?"#fbbf24":"#1e293b",
                    background: exp.paid?"rgba(74,222,128,.05)":"rgba(255,255,255,.02)",
                  }}>
                    <div style={{flex:1,minWidth:0}}>
                      <Row gap={6} style={{flexWrap:"wrap"}}>
                        <span style={{...s.expName,color:exp.paid?"#4ade80":"#e2e8f0"}}>{exp.name}</span>
                        {exp.recurring && <span style={s.badge}>↻</span>}
                        <span style={{...s.badge,background:"#1e293b",color:"#475569"}}>{exp.method}</span>
                      </Row>
                      <div style={s.expMeta}>
                        {exp.dueDay?`Vto. día ${exp.dueDay}`:"Sin vencimiento"}
                        {exp.note?` · ${exp.note}`:""}
                        {isV?" · VENCIDO":""}
                      </div>
                    </div>
                    <Row gap={6} style={{flexShrink:0}}>
                      <span style={s.expAmt}>${fmt(exp.amount)}</span>
                      <button style={{...s.iBtn,background:exp.paid?"#166534":"#1e293b",color:exp.paid?"#4ade80":"#64748b"}}
                        onClick={()=>togglePaid(exp.id)}>{exp.paid?"✓":"○"}</button>
                      <button style={{...s.iBtn,background:"#1e293b"}} onClick={()=>{setEditTarget(exp);setModal("editExp");}}>✎</button>
                      <button style={{...s.iBtn,background:"#1e293b",color:"#f87171"}} onClick={()=>deleteExp(exp.id)}>✕</button>
                    </Row>
                  </div>
                );
              })}
            </div>
          );
        })}
        {expenses.length===0 && <div style={s.emptyState}>Sin gastos este mes.<br/>Tocá "+ Agregar gasto" para empezar.</div>}
      </div>

      {(modal==="addExp"||modal==="editExp") && (
        <Modal title={modal==="editExp"?"Editar gasto":"Nuevo gasto"} onClose={()=>{setModal(null);setEditTarget(null);}}>
          <ExpenseForm initial={editTarget} categories={categories} onSave={saveExpense} onAddCat={addCat} onCancel={()=>{setModal(null);setEditTarget(null);}}/>
        </Modal>
      )}
      {modal==="income" && (
        <Modal title="Ingreso del mes" subtitle="Sueldo, honorarios o ingreso principal" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Field label="Monto en $"><Inp type="number" value={incomeVal} onChange={e=>setIncomeVal(e.target.value)} autoFocus/></Field>
            <Row gap={10}><Btn style={{flex:1}} onClick={saveIncome}>Guardar</Btn><Btn variant="sec" onClick={()=>setModal(null)}>Cancelar</Btn></Row>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── TAB FONDOS ──────────────────────────────────────────────────────────────
function TabFondos({ allMonths, setAllMonths }) {
  const [unlocked, setUnlocked]   = useState(false);
  const [pwd, setPwd]             = useState("");
  const [pwdErr, setPwdErr]       = useState(false);
  const [settings, setSettings]   = useState({ password: DEFAULT_PWD });
  const [funds, setFunds]         = useState([]);
  const [modal, setModal]         = useState(null);
  const [target, setTarget]       = useState(null);
  const [wAmt, setWAmt]           = useState("");
  const [wNote, setWNote]         = useState("");
  const [nfName, setNfName]       = useState("");
  const [nfBal, setNfBal]         = useState("");
  const [cpForm, setCpForm]       = useState({current:"",next:"",confirm:""});
  const [cpErr, setCpErr]         = useState("");

  useEffect(()=>{
    const f = load(SK.funds), st = load(SK.settings);
    if(f) setFunds(f);
    if(st) setSettings(st);
  },[]);

  const tryUnlock = () => {
    if(pwd===settings.password){setUnlocked(true);setPwdErr(false);setPwd("");}
    else{setPwdErr(true);setPwd("");}
  };

  const saveFunds = next => { setFunds(next); save(SK.funds,next); };
  const saveSettings = next => { setSettings(next); save(SK.settings,next); };

  const addFund = () => {
    if(!nfName.trim()) return;
    saveFunds([...funds,{id:uid(),name:nfName.trim(),balance:Number(nfBal)||0,movements:[]}]);
    setNfName(""); setNfBal(""); setModal(null);
  };

  const doWithdraw = () => {
    const amt = Number(wAmt);
    if(!amt||amt<=0||amt>target.balance) return;
    const curKey = mkey(TODAY.getFullYear(),TODAY.getMonth());
    const movement = {id:uid(),type:"retiro",amount:amt,date:TODAY.toLocaleDateString("es-AR"),note:wNote,monthKey:curKey};
    const updatedFunds = funds.map(f=>f.id===target.id?{...f,balance:f.balance-amt,movements:[...(f.movements||[]),movement]}:f);
    saveFunds(updatedFunds);
    const base = allMonths[curKey]??{income:0,expenses:[],extraIncome:[]};
    const extraEntry = {id:uid(),amount:amt,source:target.name,date:TODAY.toLocaleDateString("es-AR"),note:wNote};
    const nextMonths = {...allMonths,[curKey]:{...base,extraIncome:[...(base.extraIncome||[]),extraEntry]}};
    setAllMonths(nextMonths);
    save(SK.months,nextMonths);
    setWAmt(""); setWNote(""); setModal(null); setTarget(null);
  };

  const changePwd = () => {
    if(cpForm.current!==settings.password){setCpErr("La contraseña actual es incorrecta.");return;}
    if(!cpForm.next.trim()){setCpErr("La nueva contraseña no puede estar vacía.");return;}
    if(cpForm.next!==cpForm.confirm){setCpErr("Las contraseñas no coinciden.");return;}
    saveSettings({...settings,password:cpForm.next});
    setCpForm({current:"",next:"",confirm:""}); setCpErr(""); setModal(null);
  };

  const deleteFund = id => {
    if(!window.confirm("¿Eliminar este fondo?")) return;
    saveFunds(funds.filter(f=>f.id!==id));
  };

  const totalFunds = funds.reduce((s,f)=>s+f.balance,0);

  if(!unlocked) return (
    <div style={s.tabBody}>
      <div style={s.lockWrap}>
        <div style={{fontSize:52}}>🔒</div>
        <div style={s.lockTitle}>Fondos Reserva</div>
        <div style={s.lockSub}>Esta sección está protegida.<br/>Ingresá tu contraseña para continuar.</div>
        <input type="password" style={{...s.input,textAlign:"center",fontSize:22,letterSpacing:10,maxWidth:260,width:"100%"}}
          value={pwd} onChange={e=>setPwd(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&tryUnlock()} placeholder="••••••••" autoFocus/>
        {pwdErr && <div style={{color:"#f87171",fontSize:13}}>Contraseña incorrecta</div>}
        <Btn onClick={tryUnlock} style={{maxWidth:200}}>Ingresar</Btn>
      </div>
    </div>
  );

  return (
    <div style={s.tabBody}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:26,fontWeight:700,color:"#f1f5f9"}}>Fondos Reserva</div>
          <div style={{fontSize:13,color:"#64748b",marginTop:4}}>Total: <span style={{color:"#c9a96e",fontWeight:700}}>${fmt(totalFunds)}</span></div>
        </div>
        <Row gap={8}>
          <Btn onClick={()=>setModal("addFund")}>+ Nuevo fondo</Btn>
          <button style={{...s.iBtn,background:"#1e293b"}} onClick={()=>{setCpForm({current:"",next:"",confirm:""});setModal("changePwd");}}>🔑</button>
        </Row>
      </div>

      {funds.length===0 && <div style={s.emptyState}>Sin fondos registrados.<br/>Tocá "+ Nuevo fondo" para agregar.</div>}

      <div style={{display:"flex",flexDirection:"column",gap:16}}>
        {funds.map(fund=>(
          <div key={fund.id} style={s.fundCard}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{fontSize:13,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.07em",fontWeight:600}}>{fund.name}</div>
                <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:36,fontWeight:700,color:"#c9a96e",marginTop:4}}>${fmt(fund.balance)}</div>
              </div>
              <Row gap={8}>
                <Btn onClick={()=>{setTarget(fund);setWAmt("");setWNote("");setModal("withdraw");}}>Retirar</Btn>
                <button style={{...s.iBtn,background:"#0f1929",color:"#f87171"}} onClick={()=>deleteFund(fund.id)}>✕</button>
              </Row>
            </div>
            {(fund.movements||[]).length>0 && (
              <div style={{marginTop:16,borderTop:"1px solid #1a2535",paddingTop:14}}>
                <div style={{fontSize:10,color:"#334155",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:10}}>Historial</div>
                {[...(fund.movements||[])].reverse().map(m=>(
                  <div key={m.id} style={{display:"flex",gap:8,alignItems:"center",padding:"5px 0",fontSize:13,borderBottom:"1px solid #0f1929"}}>
                    <span style={{color:"#f87171"}}>↓ Retiro</span>
                    <span style={{color:"#94a3b8",flex:1,paddingLeft:8}}>{m.note||"—"}</span>
                    <span style={{color:"#f87171",fontWeight:600}}>-${fmt(m.amount)}</span>
                    <span style={{color:"#475569",fontSize:11,minWidth:70,textAlign:"right"}}>{m.date}</span>
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>

      {modal==="addFund" && (
        <Modal title="Nuevo fondo" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Field label="Nombre del fondo"><Inp value={nfName} onChange={e=>setNfName(e.target.value)} placeholder="Ej: Ahorros, Plazo fijo…" autoFocus/></Field>
            <Field label="Saldo inicial $"><Inp type="number" value={nfBal} onChange={e=>setNfBal(e.target.value)} placeholder="0"/></Field>
            <Row gap={10}><Btn style={{flex:1}} onClick={addFund}>Crear fondo</Btn><Btn variant="sec" onClick={()=>setModal(null)}>Cancelar</Btn></Row>
          </div>
        </Modal>
      )}

      {modal==="withdraw" && target && (
        <Modal title={`Retirar de "${target.name}"`} subtitle={`Disponible: $${fmt(target.balance)}`} onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Field label="Monto a retirar $"><Inp type="number" value={wAmt} onChange={e=>setWAmt(e.target.value)} placeholder="0" autoFocus/></Field>
            <Field label="Destino / Nota"><Inp value={wNote} onChange={e=>setWNote(e.target.value)} placeholder="Ej: pago impuesto inesperado"/></Field>
            <div style={{background:"#0f1929",border:"1px solid #1a2535",borderRadius:10,padding:"12px 14px",fontSize:12,color:"#64748b",lineHeight:1.6}}>
              El monto se descontará del fondo y se sumará como ingreso extraordinario al mes de {MONTHS_ES[TODAY.getMonth()]} {TODAY.getFullYear()}.
            </div>
            {Number(wAmt)>target.balance && <div style={{color:"#f87171",fontSize:13}}>⚠ Monto mayor al saldo disponible</div>}
            <Row gap={10}><Btn style={{flex:1}} onClick={doWithdraw}>Confirmar retiro</Btn><Btn variant="sec" onClick={()=>setModal(null)}>Cancelar</Btn></Row>
          </div>
        </Modal>
      )}

      {modal==="changePwd" && (
        <Modal title="Cambiar contraseña" onClose={()=>setModal(null)}>
          <div style={{display:"flex",flexDirection:"column",gap:16}}>
            <Field label="Contraseña actual"><input type="password" style={{...s.input,width:"100%"}} value={cpForm.current} onChange={e=>setCpForm(p=>({...p,current:e.target.value}))} autoFocus/></Field>
            <Field label="Nueva contraseña"><input type="password" style={{...s.input,width:"100%"}} value={cpForm.next} onChange={e=>setCpForm(p=>({...p,next:e.target.value}))}/></Field>
            <Field label="Confirmar nueva"><input type="password" style={{...s.input,width:"100%"}} value={cpForm.confirm} onChange={e=>setCpForm(p=>({...p,confirm:e.target.value}))}/></Field>
            {cpErr && <div style={{color:"#f87171",fontSize:13}}>{cpErr}</div>}
            <Row gap={10}><Btn style={{flex:1}} onClick={changePwd}>Cambiar</Btn><Btn variant="sec" onClick={()=>setModal(null)}>Cancelar</Btn></Row>
          </div>
        </Modal>
      )}
    </div>
  );
}

// ─── ROOT ─────────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]           = useState("mes");
  const [allMonths, setAllMonths] = useState({});
  const [categories, setCats]   = useState(DEFAULT_CATS);

  useEffect(()=>{
    const m = load(SK.months), c = load(SK.cats);
    if(m) setAllMonths(m);
    if(c) setCats(c);
  },[]);

  return (
    <div style={s.root}>
      <header style={s.appHeader}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={s.appLogo}>MF</div>
          <div>
            <div style={s.appName}>Mis Finanzas</div>
            <div style={s.appTagline}>economía personal</div>
          </div>
        </div>
        <nav style={s.tabNav}>
          <button style={{...s.tabBtn,...(tab==="mes"?s.tabActive:{})}} onClick={()=>setTab("mes")}>📅 Mes</button>
          <button style={{...s.tabBtn,...(tab==="fondos"?s.tabActive:{})}} onClick={()=>setTab("fondos")}>🔒 Fondos</button>
        </nav>
      </header>

      {tab==="mes"
        ? <TabMes allMonths={allMonths} setAllMonths={setAllMonths} categories={categories} setCategories={setCats}/>
        : <TabFondos allMonths={allMonths} setAllMonths={setAllMonths}/>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
